<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Verse of the Day</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .verse-card {
            width: 350px;
            /* Replace with your image URL */
            background-image: url('https://images.unsplash.com/photo-1511107823419-f9c424a1b069?q=80&w=350');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            color: white;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .verse-text {
            font-size: 22px;
            font-style: italic;
            margin-bottom: 15px;
        }
        .verse-reference {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="verse-card">
        <p class="verse-text">"I can do all things through Christ who strengthens me."</p>
        <p class="verse-reference">- Philippians 4:13</p>
    </div>

</body>
</html>
