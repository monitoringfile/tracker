<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Verse with Background</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .verse-card {
            position: relative;
            width: 90%;
            max-width: 700px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        /* The Background Image Layer */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* REPLACE 'image_cd12be.png' with your actual file name */
            background-image: url('https://github.com/monitoringfile/tracker/blob/main/Media%20(13).jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Dark overlay to make text pop */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55); /* Adjust 0.55 for more/less darkness */
            z-index: 2;
        }

        /* Content Layer */
        .content {
            position: relative;
            z-index: 3;
            padding: 60px 40px;
        }

        .verse-text {
            font-size: 1.8rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .reference {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.4);
            display: inline-block;
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="verse-card">
        <div class="background-image"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <div class="verse-text">
                "For I know the plans I have for you," declares the LORD, 
                "plans to prosper you and not to harm you, 
                plans to give you hope and a future."
            </div>
            <div class="reference">
                Jeremiah 29:11
            </div>
        </div>
    </div>

</body>
</html>
